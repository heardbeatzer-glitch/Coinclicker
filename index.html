<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golden Infinity Clicker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sunburst"></div>

    <main id="game-area">
        <div id="stats">
            <h1 id="balance">€0</h1>
            <p id="cps">Inkomen: €0 /sec</p>
        </div>
        <div id="coin-container">
            <div id="coin">€</div>
        </div>
    </main>

    <aside id="sidebar">
        <h2>Shop</h2>
        <div id="upg-click" class="upgrade-card">
            <div class="info">
                <span class="name">Sterkere Vinger</span>
                <span id="click-lv" class="level">Level 0</span>
            </div>
            <div id="click-cost" class="price">€10</div>
        </div>
        <div id="upg-auto" class="upgrade-card">
            <div class="info">
                <span class="name">Goud Mijnwerker</span>
                <span id="auto-lv" class="level">Level 0</span>
            </div>
            <div id="auto-cost" class="price">€50</div>
        </div>
    </aside>

    <script src="script.js"></script>
</body>
</html>
